name: CI - Train and Deploy MLflow Model

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MLflow and dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn==1.6.1 pandas numpy matplotlib seaborn

      - name: Run MLflow Project
        run: |
          mlflow run MLProject/ --env-manager=local

      - name: Upload MLflow artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/
          retention-days: 30

      - name: Commit mlruns to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mlruns/
          git commit -m "chore: update mlflow artifacts [skip ci]" || echo "No changes to commit"
          git push

  docker-build-push:
    runs-on: ubuntu-latest
    needs: train

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download MLflow artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MLflow
        run: pip install mlflow==2.19.0

      - name: Get latest run ID
        id: get_run_id
        run: |
          RUN_ID=$(ls mlruns/0/ | grep -v meta.yaml | head -1)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Model path: mlruns/0/$RUN_ID/artifacts/model"

      - name: Build Docker image with MLflow
        run: |
          mlflow models build-docker \
            --model-uri "mlruns/0/${{ steps.get_run_id.outputs.run_id }}/artifacts/model" \
            --name iris-model

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push Docker image
        run: |
          docker tag iris-model ${{ secrets.DOCKER_USERNAME }}/iris-model:latest
          docker tag iris-model ${{ secrets.DOCKER_USERNAME }}/iris-model:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/iris-model:${{ github.sha }}
